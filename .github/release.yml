# Configures GitHub's auto-generated release notes (used by GoReleaser
# changelog.use: github-native). Categories match PR labels; direct commits and
# unlabeled PRs fall into "Other changes".
changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot
      - github-actions
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
    - title: Other changes
      labels:
        - "*"
