name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
jobs:
  # Gate the release on the full CI suite (build, vet, test+coverage, lint) by
  # calling the reusable ci workflow. release runs only if this passes.
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Generate third-party licenses
        run: make third-party-licenses
      - uses: sigstore/cosign-installer@v4.1.2
      - uses: anchore/sbom-action/download-syft@v0.24.0
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Lets GoReleaser push the Homebrew formula to alexremn/homebrew-tap.
          # (krew is handled separately by krew.yml on release publish.)
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      - uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/checksums.txt
