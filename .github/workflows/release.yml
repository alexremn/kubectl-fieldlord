# Release workflow — runs ONLY on v* tags.
#
# PREREQUISITES (owner-managed, one-time):
#   - The repository must be PUBLIC (cosign keyless OIDC + krew submission assume public).
#   - Secret KREW_INDEX_TOKEN: a PAT with content+PR scope on the alexremn/krew-index fork
#     (the default GITHUB_TOKEN cannot push to another owner's repo).
#   - A alexremn/krew-index fork of kubernetes-sigs/krew-index must exist.
# Trigger: push a tag, e.g. `git tag v0.2.0 && git push origin v0.2.0`.
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: '1.26'
      - name: Generate third-party licenses
        run: make third-party-licenses
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-checksums: ./dist/checksums.txt
