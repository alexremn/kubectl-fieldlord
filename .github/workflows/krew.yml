name: krew
on:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  krew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Reads .krew.yaml, fills version + per-archive sha256 from the published
      # release, and opens a PR to kubernetes-sigs/krew-index (first submission +
      # every subsequent update). No fork or extra token required.
      - uses: rajatjindal/krew-release-bot@v0.0.51
