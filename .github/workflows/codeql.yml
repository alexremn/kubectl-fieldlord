name: codeql
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1'
permissions:
  contents: read
  security-events: write
  actions: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    # Code scanning (SARIF upload) is free on public repos but needs GitHub
    # Advanced Security on private ones. Skip while private so the run isn't red;
    # it starts running automatically once the repo is public.
    if: ${{ github.event.repository.private == false }}
    steps:
      # Diff-informed analysis (default in codeql-action v4) fetches the PR base
      # ref to compute changed-line ranges. A shallow clone breaks that fetch
      # ("error processing shallow info"), so the action emits `undefined` ranges
      # and the run fails. Full history makes the base diff resolvable.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: github/codeql-action/init@v4.36.3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4.36.3
      - uses: github/codeql-action/analyze@v4.36.3
