version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kubectl-fieldlord
    main: ./cmd/kubectl-fieldlord
    binary: kubectl-fieldlord
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/alexremn/kubectl-fieldlord/internal/buildinfo.Version={{ .Version }}
      - -X github.com/alexremn/kubectl-fieldlord/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/alexremn/kubectl-fieldlord/internal/buildinfo.Date={{ .CommitDate }}

archives:
  - id: archives
    formats: [tar.gz]
    # Version-less names so .krew.yaml download URLs are stable (the tag lives in
    # the release path, not the filename). krew-release-bot fills the sha256.
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - THIRD_PARTY_LICENSES

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: spdx
    artifacts: archive
    args: ['$artifact', '--output', 'spdx-json=$document']
    documents: ['${artifact}.spdx.sbom.json']
  - id: cdx
    artifacts: archive
    args: ['$artifact', '--output', 'cyclonedx-json=$document']
    documents: ['${artifact}.cdx.sbom.json']

signs:
  - cmd: cosign
    artifacts: checksum
    signature: '${artifact}.sigstore.json'
    args: ['sign-blob', '--yes', '--bundle=${signature}', '${artifact}']
    output: true

# Homebrew tap. GoReleaser generates Casks/kubectl-fieldlord.rb in
# alexremn/homebrew-tap on each tagged release -> `brew install
# alexremn/tap/kubectl-fieldlord`. (homebrew_casks, not the deprecated `brews`,
# is the current path for pre-built CLI binaries.) krew is handled separately by
# .krew.yaml + .github/workflows/krew.yml (krew-release-bot), NOT here.
homebrew_casks:
  - name: kubectl-fieldlord
    repository:
      owner: alexremn
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    homepage: https://github.com/alexremn/kubectl-fieldlord
    description: Explain Server-Side Apply field ownership, drift, and clobber risk
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    # Strip the macOS quarantine xattr so the unsigned binary runs without a
    # right-click-open prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kubectl-fieldlord"]
          end
    caveats: |
      Installed as a kubectl plugin on your PATH:
        kubectl fieldlord explain <resource>

release:
  # Draft first so you can review the notes; publishing the release then fires
  # .github/workflows/krew.yml (krew-release-bot) to open the krew-index PR.
  draft: true
  header: |
    Make Kubernetes Server-Side Apply field ownership legible — straight from `kubectl`.

    ### Highlights
    - 🔎 **`explain`** — per-field ownership table from `managedFields` (who owns each field, which operation, which manager).
    - 🧭 **`drift`** — attribute ownership drift to a `fieldManager`; `-f desired.yaml` diffs a manifest against live state with full attribution.
    - 💥 **`predict`** — server-side dry-run that shows exactly what `--force-conflicts` would clobber, and who owns it.
    - 🔒 **Read-mostly & honest** — `explain`/`drift` are pure reads; `predict` is a non-persisting dry-run. No telemetry, no LLM.

    ### Install
    ```sh
    # Homebrew
    brew install alexremn/tap/kubectl-fieldlord
    # krew (once accepted into krew-index)
    kubectl krew install fieldlord
    ```
    Or grab a static binary from the assets below (rename to `kubectl-fieldlord`, put on `PATH`).

    ---

changelog:
  # GitHub-rendered notes grouped by PR label (.github/release.yml). No raw
  # commit SHAs; the curated header above is the real summary.
  use: github-native
